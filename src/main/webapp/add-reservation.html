<!-- Add Reservation Page - Form to create a new hotel reservation -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Reservation - Ocean View Resort</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── Room Grid ── */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 14px;
        }

        /* ── Room Card ── */
        .room-card {
            border: 2px solid #e0e7ef;
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
        }
        .room-card:hover  { box-shadow: 0 6px 22px rgba(0,119,182,0.15); transform: translateY(-2px); }
        .room-card.selected { border-color: #0077b6; box-shadow: 0 0 0 3px rgba(0,119,182,0.2); }

        /* ── Card Image Banner ── */
        .room-card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
        }
        /* Fallback gradient per type when image fails */
        .room-card-img.type-standard { background: linear-gradient(135deg, #48cae4, #0077b6); }
        .room-card-img.type-deluxe   { background: linear-gradient(135deg, #023e8a, #0096c7); }
        .room-card-img.type-suite    { background: linear-gradient(135deg, #6a0572, #1a237e); }

        /* ── Card Body ── */
        .room-card-body { padding: 13px 14px 14px; }

        .room-card-name {
            font-size: 0.97rem;
            font-weight: 700;
            color: #023e8a;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        /* ── Info Chips ── */
        .room-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .chip {
            font-size: 0.72rem;
            background: #f0f4f8;
            color: #444;
            border-radius: 20px;
            padding: 3px 9px;
            border: 1px solid #dce3ec;
            white-space: nowrap;
        }

        /* ── Amenities ── */
        .room-amenities-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
        }
        .room-amenities-short {
            font-size: 0.78rem;
            color: #555;
            margin-bottom: 8px;
        }

        /* ── View Details toggle ── */
        .view-details-link {
            font-size: 0.78rem;
            color: #0077b6;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            padding: 0;
            margin-bottom: 6px;
            text-decoration: none;
        }
        .view-details-link:hover { text-decoration: underline; }

        .room-details-panel {
            display: none;
            background: #f8fafd;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .room-details-panel.open { display: block; }
        .details-list {
            list-style: none;
            padding: 0; margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 10px;
        }
        .details-list li {
            font-size: 0.76rem;
            color: #444;
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }
        .details-list li::before {
            content: '✓';
            color: #0077b6;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── Meal Plan Selector ── */
        .meal-plan-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin: 10px 0 5px;
        }
        .meal-plan-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }
        .meal-plan-btn {
            padding: 5px 3px;
            border: 1.5px solid #d0dae8;
            border-radius: 6px;
            background: #f8fafd;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .meal-plan-btn:hover { border-color: #0077b6; background: #e8f4fb; }
        .meal-plan-btn.active { border-color: #0077b6; background: #0077b6; color: #fff; }
        .meal-plan-btn .plan-code {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .meal-plan-btn .plan-price {
            display: block;
            font-size: 0.65rem;
            opacity: 0.85;
            white-space: nowrap;
        }
        .meal-plan-btn.active .plan-price { opacity: 0.9; }

        /* ── Price + Select ── */
        .room-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eef1f6;
            flex-wrap: wrap;
            gap: 6px;
        }
        .room-price-tag {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0077b6;
        }
        .room-price-tag span {
            font-size: 0.72rem;
            font-weight: 400;
            color: #888;
        }
        .btn-select-room {
            font-size: 0.78rem;
            font-weight: 700;
            padding: 6px 14px;
            background: #0077b6;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-select-room:hover { background: #023e8a; }
        .room-card.selected .btn-select-room { background: #2e7d32; }
        .room-card.selected .btn-select-room::before { content: '✓ '; }
    </style>
</head>
<body data-page="add-reservation">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="dashboard.html" class="logo">Ocean View</a>
        <ul class="nav-links">
            <li><a href="add-reservation.html" class="active">Add Reservation</a></li>
            <li><a href="view-reservation.html">View Reservations</a></li>
            <li><a href="billing.html">Billing</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="help.html">Help</a></li>
        </ul>
        <div class="user-info">
            <span id="navUserName"></span>
            <a href="logout">Logout</a>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title">New Reservation</h1>
        <div id="alertContainer"></div>

        <div class="card">
            <div class="card-header">Guest Details</div>
            <form id="reservationForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="guestName">Guest Name *</label>
                        <input type="text" id="guestName" name="guestName" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label for="contactNumber">Contact Number *</label>
                        <input type="text" id="contactNumber" name="contactNumber" placeholder="+94XXXXXXXXX" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="guestEmail">Email</label>
                        <input type="email" id="guestEmail" name="guestEmail" placeholder="guest@email.com">
                    </div>
                    <div class="form-group">
                        <label for="guestAddress">Address</label>
                        <input type="text" id="guestAddress" name="guestAddress" placeholder="Guest address">
                    </div>
                </div>

                <div class="card-header" style="margin-top: 1rem;">Room Selection</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="roomType">Room Type *</label>
                        <select id="roomType" name="roomType" required>
                            <option value="">Select room type</option>
                            <option value="STANDARD">Standard</option>
                            <option value="DELUXE">Deluxe</option>
                            <option value="SUITE">Suite</option>
                        </select>
                    </div>
                    <div class="form-group"><label>&nbsp;</label></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="checkInDate">Check-In Date *</label>
                        <input type="date" id="checkInDate" name="checkInDate" required>
                    </div>
                    <div class="form-group">
                        <label for="checkOutDate">Check-Out Date *</label>
                        <input type="date" id="checkOutDate" name="checkOutDate" required>
                    </div>
                </div>

                <!-- Available Rooms Section -->
                <div id="availableRoomsSection" style="display: none;">
                    <div class="card-header">Available Rooms</div>
                    <div id="roomGrid" class="room-grid"></div>
                    <input type="hidden" id="selectedRoomId" name="roomId">
                    <!-- Stores selected meal plan: RO / BB / HB / FB -->
                    <input type="hidden" id="selectedMealPlan" name="mealPlan" value="RO">
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label for="specialRequests">Special Requests</label>
                    <textarea id="specialRequests" name="specialRequests" placeholder="Any special requests..."></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Create Reservation</button>
                    <button type="reset" class="btn btn-outline">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // ── Room data: extra info per room code ──────────────────────────────
        // Images use the project's existing photos; fallback to CSS gradient class
        var roomData = {
            'STD-TW':  {
                bed: 'Twin Beds', size: '28 m²',
                img: 'images/room.jpg',
                short: 'Wi-Fi  •  AC  •  32" TV  •  En-suite Bath',
                details: ['2 Single Beds','Garden / Pool View','En-suite Bathroom (Shower)',
                          'Air Conditioning','Ceiling Fan','Free Wi-Fi','32" Flat-screen TV',
                          'Tea & Coffee Maker','Wardrobe','In-room Safe','Daily Housekeeping']
            },
            'STD-DBL': {
                bed: '1 Double Bed', size: '28 m²',
                img: 'images/room2.jpg',
                short: 'Wi-Fi  •  AC  •  32" TV  •  En-suite Bath',
                details: ['1 Double Bed','Garden View','En-suite Bathroom (Shower)',
                          'Air Conditioning','Ceiling Fan','Free Wi-Fi','32" Flat-screen TV',
                          'Minibar (on request)','Tea & Coffee Maker','Wardrobe','In-room Safe','Daily Housekeeping']
            },
            'STD-BAL': {
                bed: '1 King Bed', size: '32 m²',
                img: 'images/room3.jpg',
                short: 'Balcony  •  Partial Ocean View  •  Wi-Fi  •  AC',
                details: ['1 King Bed','Private Balcony','Partial Ocean View',
                          'En-suite Bathroom (Bathtub + Shower)','Air Conditioning',
                          'Free Wi-Fi','40" Flat-screen TV','Minibar',
                          'Tea & Coffee Maker','In-room Safe','Daily Housekeeping','Welcome Fruits']
            },
            'DLX-OV':  {
                bed: '1 King Bed', size: '39 m²',
                img: 'images/room4.jpg',
                short: 'Full Ocean View  •  Balcony  •  Bathtub  •  Smart TV',
                details: ['1 King Bed','Full Ocean View','Private Balcony',
                          'Bathtub + Rainfall Shower','Air Conditioning','Free Wi-Fi',
                          '50" Smart TV','Fully Stocked Minibar','Nespresso Machine',
                          'In-room Safe','Wardrobe','Turndown Service','Welcome Drink & Fruits']
            },
            'DLX-PV':  {
                bed: '1 King Bed', size: '39 m²',
                img: 'images/room5.jpg',
                short: 'Pool View  •  Private Terrace  •  Bathtub  •  Smart TV',
                details: ['1 King Bed','Pool View','Private Terrace',
                          'Bathtub + Rainfall Shower','Air Conditioning','Free Wi-Fi',
                          '50" Smart TV','Fully Stocked Minibar','Nespresso Machine',
                          'In-room Safe','Wardrobe','Turndown Service']
            },
            'DLX-JQ':  {
                bed: '1 King Bed', size: '45 m²',
                img: 'images/room4.jpg',
                short: 'Private Jacuzzi  •  Terrace  •  Ocean View  •  Smart TV',
                details: ['1 King Bed','Private Terrace with Jacuzzi','Garden / Ocean View',
                          'En-suite Bathroom (Rainfall Shower)','Outdoor Jacuzzi',
                          'Air Conditioning','Free Wi-Fi','50" Smart TV',
                          'Fully Stocked Minibar','Nespresso Machine','In-room Safe','Turndown Service']
            },
            'STE-JR':  {
                bed: '1 King Bed', size: '57 m²',
                img: 'images/room5.jpg',
                short: 'Panoramic Ocean View  •  Living Area  •  2 Bathrooms',
                details: ['1 King Bed','Separate Living Area','Panoramic Ocean View',
                          'Private Balcony','2 Bathrooms (Bathtub + Rainfall Shower)','Air Conditioning',
                          'Free Wi-Fi','55" Smart TV','Fully Stocked Minibar',
                          'Nespresso Machine','Walk-in Closet','Butler Service (on request)',
                          'Complimentary Airport Transfer','Welcome Amenities']
            },
            'STE-PR':  {
                bed: '1 King + Sofa Bed', size: '95 m²',
                img: 'images/room3.jpg',
                short: 'Private Pool  •  Panoramic View  •  2 Full Baths  •  Butler',
                details: ['1 King Bed + Sofa Bed','Separate Bedroom, Living Room & Dining Area',
                          'Private Plunge Pool','Panoramic Ocean View',
                          '2 Full Luxury Bathrooms (Bathtub + Rainfall Shower)',
                          'Air Conditioning','Free Wi-Fi','65" Smart TV',
                          'Fully Stocked Minibar & Bar','Nespresso Machine',
                          'Walk-in Closet','24-hr Dedicated Butler Service',
                          'Complimentary Airport Transfer','Complimentary Spa Treatment (1 per stay)',
                          'Welcome Amenities & Fresh Flowers']
            }
        };

        // ── Date setup ───────────────────────────────────────────────────────
        var today = new Date().toISOString().split('T')[0];
        document.getElementById('checkInDate').min = today;
        document.getElementById('checkOutDate').min = today;

        ['roomType', 'checkInDate', 'checkOutDate'].forEach(function(id) {
            document.getElementById(id).addEventListener('change', loadAvailableRooms);
        });

        // ── Load available rooms ─────────────────────────────────────────────
        function loadAvailableRooms() {
            var type   = document.getElementById('roomType').value;
            var checkIn  = document.getElementById('checkInDate').value;
            var checkOut = document.getElementById('checkOutDate').value;
            if (!type || !checkIn || !checkOut) return;
            if (checkOut <= checkIn) {
                showAlert('error', 'Check-out date must be after check-in date');
                return;
            }

            var section = document.getElementById('availableRoomsSection');
            var grid    = document.getElementById('roomGrid');

            apiCall('/api/rooms?checkIn=' + checkIn + '&checkOut=' + checkOut + '&type=' + type, 'GET')
                .then(function(rooms) {
                    grid.innerHTML = '';
                    if (rooms.length === 0) {
                        grid.innerHTML = '<div class="empty-state"><p>No rooms available for the selected dates and type.</p></div>';
                    } else {
                        rooms.forEach(function(room) {
                            var d    = roomData[room.roomNumber] || {};
                            var type = room.roomType.toLowerCase();

                            // ── Image banner ──────────────────────────────
                            var imgHtml = d.img
                                ? '<img class="room-card-img type-' + type + '" src="' + d.img + '" alt="' + room.description + '" onerror="this.classList.add(\'img-err\')">'
                                : '<div class="room-card-img type-' + type + '"></div>';

                            // ── Chips ─────────────────────────────────────
                            var chips = '<span class="chip">' + room.maxOccupancy + ' adults</span>'
                                      + (d.bed  ? '<span class="chip">' + d.bed  + '</span>' : '')
                                      + (d.size ? '<span class="chip">' + d.size + '</span>' : '');

                            // ── Details list ──────────────────────────────
                            var detailItems = (d.details || []).map(function(item) {
                                return '<li>' + item + '</li>';
                            }).join('');

                            // Build meal plan price buttons (RO / BB / HB / FB)
                            var mealPlanHtml =
                                '<div class="meal-plan-label">Select Meal Plan</div>' +
                                '<div class="meal-plan-options">' +
                                    '<div class="meal-plan-btn active" onclick="selectMealPlan(this,\'RO\',' + room.roomId + ')">' +
                                        '<span class="plan-code">RO</span>' +
                                        '<span class="plan-price">LKR ' + formatCurrency(room.pricePerNight) + '</span>' +
                                    '</div>' +
                                    (room.bbPrice ? '<div class="meal-plan-btn" onclick="selectMealPlan(this,\'BB\',' + room.roomId + ')">' +
                                        '<span class="plan-code">BB</span>' +
                                        '<span class="plan-price">LKR ' + formatCurrency(room.bbPrice) + '</span>' +
                                    '</div>' : '') +
                                    (room.hbPrice ? '<div class="meal-plan-btn" onclick="selectMealPlan(this,\'HB\',' + room.roomId + ')">' +
                                        '<span class="plan-code">HB</span>' +
                                        '<span class="plan-price">LKR ' + formatCurrency(room.hbPrice) + '</span>' +
                                    '</div>' : '') +
                                    (room.fbPrice ? '<div class="meal-plan-btn" onclick="selectMealPlan(this,\'FB\',' + room.roomId + ')">' +
                                        '<span class="plan-code">FB</span>' +
                                        '<span class="plan-price">LKR ' + formatCurrency(room.fbPrice) + '</span>' +
                                    '</div>' : '') +
                                '</div>';

                            var card = document.createElement('div');
                            card.className = 'room-card';
                            card.dataset.roomId = room.roomId;
                            card.innerHTML =
                                imgHtml +
                                '<div class="room-card-body">' +
                                    '<div class="room-card-name">' + room.description + '</div>' +
                                    '<div class="room-chips">' + chips + '</div>' +
                                    '<div class="room-amenities-label">Main amenities</div>' +
                                    '<div class="room-amenities-short">' + (d.short || 'Wi-Fi  •  AC  •  En-suite Bathroom') + '</div>' +
                                    (detailItems
                                        ? '<button type="button" class="view-details-link" onclick="toggleDetails(this)">View Details ↓</button>' +
                                          '<div class="room-details-panel"><ul class="details-list">' + detailItems + '</ul></div>'
                                        : '') +
                                    mealPlanHtml +
                                    '<div class="room-card-footer">' +
                                        '<div class="room-price-tag" id="price-' + room.roomId + '">LKR ' + formatCurrency(room.pricePerNight) + ' <span>/ night · Room Only</span></div>' +
                                        '<button type="button" class="btn-select-room" data-room-id="' + room.roomId + '">Select Room</button>' +
                                    '</div>' +
                                '</div>';

                            // Select on card click (but not on the details button)
                            card.addEventListener('click', function(e) {
                                if (e.target.classList.contains('view-details-link') ||
                                    e.target.classList.contains('btn-select-room')) return;
                                selectRoom(card, room.roomId);
                            });
                            // Select button
                            card.querySelector('.btn-select-room').addEventListener('click', function(e) {
                                e.stopPropagation();
                                selectRoom(card, room.roomId);
                            });

                            grid.appendChild(card);
                        });
                    }
                    section.style.display = '';
                })
                .catch(function() { showAlert('error', 'Failed to load rooms'); });
        }

        // ── Meal plan labels for display ─────────────────────────────────────
        var planLabels = { RO: 'Room Only', BB: 'Bed & Breakfast', HB: 'Half Board', FB: 'Full Board' };

        // ── Select a meal plan button on a card ──────────────────────────────
        // Updates the active button highlight, the price tag, and the hidden mealPlan field.
        // Only updates the mealPlan hidden input if this card's room is already selected.
        function selectMealPlan(btn, planCode, roomId) {
            // Highlight the clicked plan button, clear others in this card
            var card = btn.closest('.room-card');
            card.querySelectorAll('.meal-plan-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');

            // Update the price tag shown at the bottom of the card
            var priceTag = document.getElementById('price-' + roomId);
            if (priceTag) {
                priceTag.innerHTML = btn.querySelector('.plan-price').textContent + ' <span>/ night · ' + (planLabels[planCode] || planCode) + '</span>';
            }

            // If this card is already the selected room, update the hidden meal plan field
            var currentRoomId = document.getElementById('selectedRoomId').value;
            if (currentRoomId == roomId) {
                document.getElementById('selectedMealPlan').value = planCode;
            }
            // Store the chosen plan on the card so it gets applied when the room is selected
            card.dataset.mealPlan = planCode;
        }

        // ── Toggle View Details panel ────────────────────────────────────────
        function toggleDetails(btn) {
            var panel = btn.nextElementSibling;
            var open  = panel.classList.toggle('open');
            btn.textContent = open ? 'Hide Details ↑' : 'View Details ↓';
        }

        // ── Select a room card ───────────────────────────────────────────────
        // Marks the card as selected and copies its chosen meal plan to the hidden field.
        function selectRoom(card, roomId) {
            document.querySelectorAll('.room-card').forEach(function(c) { c.classList.remove('selected'); });
            card.classList.add('selected');
            document.getElementById('selectedRoomId').value = roomId;
            // Carry over whichever meal plan button is active on this card (default RO)
            document.getElementById('selectedMealPlan').value = card.dataset.mealPlan || 'RO';
        }

        // ── Form submission ──────────────────────────────────────────────────
        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var name    = document.getElementById('guestName').value.trim();
            var phone   = document.getElementById('contactNumber').value.trim();
            var email   = document.getElementById('guestEmail').value.trim();
            var checkIn  = document.getElementById('checkInDate').value;
            var checkOut = document.getElementById('checkOutDate').value;
            var roomId   = document.getElementById('selectedRoomId').value;

            if (name.length < 2)                                              { showAlert('error', 'Please enter a valid guest name'); return; }
            if (!/^\+?[0-9]{7,15}$/.test(phone))                             { showAlert('error', 'Please enter a valid phone number'); return; }
            if (email && !/^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$/.test(email))  { showAlert('error', 'Please enter a valid email'); return; }
            if (checkOut <= checkIn)                                           { showAlert('error', 'Check-out must be after check-in'); return; }
            if (!roomId)                                                       { showAlert('error', 'Please select a room'); return; }

            var formData = new URLSearchParams();
            formData.append('guestName',       name);
            formData.append('guestAddress',    document.getElementById('guestAddress').value.trim());
            formData.append('contactNumber',   phone);
            formData.append('guestEmail',      email);
            formData.append('roomId',          roomId);
            formData.append('checkInDate',     checkIn);
            formData.append('checkOutDate',    checkOut);
            formData.append('specialRequests', document.getElementById('specialRequests').value.trim());

            apiCall('/api/reservations', 'POST', formData.toString())
                .then(function(data) {
                    if (data.success) {
                        showAlert('success', 'Reservation created! Number: ' + data.reservationNumber);
                        document.getElementById('reservationForm').reset();
                        document.getElementById('availableRoomsSection').style.display = 'none';
                    } else {
                        showAlert('error', data.error || 'Failed to create reservation');
                    }
                })
                .catch(function() { showAlert('error', 'Failed to create reservation'); });
        });
    </script>
</body>
</html>

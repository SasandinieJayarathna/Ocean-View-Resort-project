<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Ocean View Resort</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .error-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 80vh; text-align: center; padding: 2rem;
        }
        .error-code { font-size: 6rem; font-weight: bold; color: #e63946; margin: 0; }
        .error-message { font-size: 1.5rem; color: #666; margin: 1rem 0 2rem; }
        .error-link {
            display: inline-block; padding: 12px 30px; background: #0077b6;
            color: white; text-decoration: none; border-radius: 6px; font-size: 1.1rem;
        }
        .error-link:hover { background: #023e8a; }
    </style>
</head>
<body>
    <div class="error-container">
        <p class="error-code">500</p>
        <p class="error-message">Something went wrong on our end. Please try again later.</p>
        <a href="../dashboard.html" class="error-link">Return to Dashboard</a>
    </div>
</body>
</html>

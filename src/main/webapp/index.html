<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Hotel Branding -->
            <div class="login-header">
                <h1>Ocean View Resort</h1>
                <p class="tagline">Galle, Sri Lanka</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Error message (hidden by default) -->
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <div class="login-footer">
                <p>Room Reservation Management System</p>
            </div>
        </div>
    </div>

    <!-- Login Script -->
    <script>
        // Determine context path for servlet requests
        const contextPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // POST to login servlet
            fetch(contextPath + '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password)
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    // Redirect to dashboard on success
                    window.location.href = 'dashboard.html';
                } else {
                    // Show error message
                    errorDiv.textContent = data.error || 'Login failed. Please try again.';
                    errorDiv.style.display = 'block';
                }
            })
            .catch(function(err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>

name: CI - Build and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: oceanview_resort
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u root -ptestpassword < src/main/resources/db/schema.sql

      - name: Create test db.properties
        run: |
          echo "db.url=jdbc:mysql://127.0.0.1:3306/oceanview_resort?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" > src/main/resources/db.properties
          echo "db.username=root" >> src/main/resources/db.properties
          echo "db.password=testpassword" >> src/main/resources/db.properties
          echo "db.driver=com.mysql.cj.jdbc.Driver" >> src/main/resources/db.properties

      - name: Build project
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Generate coverage report
        run: mvn jacoco:report

      - name: Build WAR package
        run: mvn package -DskipTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: oceanview-war
          path: target/oceanview-reservation.war
